<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxurious Bridal Haven</title>
  <link rel="stylesheet" href="css/style.min.css">
</head>
<body>
  <div class="wrapper">
    <header class="header">
      <div class="container">
        <div class="header__inner">
          <button class="header__btn">
            <svg width="30" height="19">
              <use xlink:href="images/sprite.svg#menu-btn"></use>
            </svg>
          </button>
          <div class="header__logo">
            <a class="logo" href="#">
              <img class="logo__img" src="images/logo.svg" alt="логотип">
            </a>
          </div>
          <nav class="menu">
            <ul class="header__lang">
              <li class="header__lang-item header__lang-item--active">
                <a href="#" class="header__lang-link">EN</a>/
              </li>
              <li class="header__lang-item">
                <a href="#" class="header__lang-link">UA</a>
              </li>
            </ul>
            <ul class="menu__items">
              <li class="menu__item">
                <a href="#" class="menu__item-link">CATALOG</a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__item-link">COLLECTIONS</a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__item-link">ABOUT</a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__item-link">BOOK AN APPOINTMENT</a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__item-link">CONTACT</a>
              </li>
            </ul>
          </nav>
          <ul class="header__actions">
            <li class="header__actions-item">
              <a href="#" class="header__actions-link">
                <svg width="24" height="24">
                  <use xlink:href="images/sprite.svg#account"></use>
                </svg>
              </a>
            </li>
            <li class="header__actions-item">
              <a href="#" class="header__actions-link">
                <svg width="24" height="24">
                  <use xlink:href="images/sprite.svg#wishlist"></use>
                </svg>
              </a>
            </li>
            <li class="header__actions-item">
              <a href="#" class="header__actions-link open-modal" aria-label="Открыть модальное окно">
                <svg width="24" height="21">
                  <use xlink:href="images/sprite.svg#basket"></use>
                </svg>
              </a>
            </li>
          </ul>
        </div>
        <div class="modal" aria-hidden="true">
          <div class="modal__overlay"></div>
          <div class="modal__content" role="dialog" aria-modal="true">
            <div class="checkout__details">
              <div class="checkout__details-itemsline">
                <p class="checkout__details-quantity">2 items in bag</p>
                <button class="checkout__details-del close-modal" aria-label="Закрыть модальное окно">
                  <svg width="18" height="18">
                    <use xlink:href="images/sprite.svg#checkout-del"></use>
                  </svg>
                </button>
              </div>
              <div class="checkout__details-item">
                <picture>
                  <source srcset="images/checkout-1.avif" type="image/avif">
                  <source srcset="images/checkout-1.webp" type="image/webp">
                  <img src="images/checkout-1.jpg" alt="Alt text">
                </picture>
                <div class="checkout__item-box">
                  <p class="checkout__item-name">NAOMI</p>
                  <dl class="checkout__item-list">
                    <div class="checkout__item-listbox">
                      <dt class="checkout__item-term">SIZE:</dt>
                      <dd class="checkout__item-definition">S</dd>
                    </div>
                    <div class="checkout__item-listbox">
                      <dt class="checkout__item-term">COLOR:</dt>
                      <dd class="checkout__item-definition">IVORY</dd>
                    </div>
                    <div class="checkout__item-listbox">
                      <dt class="checkout__item-term">Item subtotal:</dt>
                      <dd class="checkout__item-definition">€ 2,600</dd>
                    </div>
                  </dl>
                  <button class="checkout__item-del">
                    <svg width="20" height="20">
                      <use xlink:href="images/sprite.svg#checkout-item-del"></use>
                    </svg>
                  </button>
                </div>
              </div>
              <div class="checkout__details-item">
                <picture>
                  <source srcset="images/checkout-2.avif" type="image/avif">
                  <source srcset="images/checkout-2.webp" type="image/webp">
                  <img src="images/checkout-2.jpg" alt="Alt text">
                </picture>
                <div class="checkout__item-box">
                  <p class="checkout__item-name">SABINE</p>
                  <dl class="checkout__item-list">
                    <div class="checkout__item-listbox">
                      <dt class="checkout__item-term">SIZE:</dt>
                      <dd class="checkout__item-definition">38</dd>
                    </div>
                    <div class="checkout__item-listbox">
                      <dt class="checkout__item-term">COLOR:</dt>
                      <dd class="checkout__item-definition">IVORY</dd>
                    </div>
                    <div class="checkout__item-listbox">
                      <dt class="checkout__item-term">Item subtotal:</dt>
                      <dd class="checkout__item-definition">€ 200</dd>
                    </div>
                  </dl>
                  <button class="checkout__item-del">
                    <svg width="20" height="20">
                      <use xlink:href="images/sprite.svg#checkout-item-del"></use>
                    </svg>
                  </button>
                </div>
              </div>
              <div class="order">
                <dl class="order__list">
                  <div class="order__list-box">
                    <dt class="order__list-term">Subtotal:</dt>
                    <dd class="order__list-definition">€2, 800</dd>
                  </div>
                  <div class="order__list-box">
                    <dt class="order__list-term">Shipping:</dt>
                    <dd class="order__list-definition">FREE</dd>
                  </div>
                  <div class="order__list-box">
                    <dt class="order__list-term">Total:</dt>
                    <dd class="order__list-definition">€ 2,800</dd>
                  </div>
                </dl>
                <div class="order__links">
                  <a class="order__link" href="#">KEEP SHOPPING</a>
                  <a class="order__link-now" href="#">BUY IT NOW</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
