    <main class="main">
      <section class="appointment">
        <div class="container">
          <h2 class="appointment__title">BOOK AN APPOINTMENT</h2>
          <div class="appointment__box">
            <form class="appointment__form" action="">
              <p class="appointment__form-title">CONTACT INFORMATHION</p>
              <p class="appointment__form-text">Fill in your contact details</p>
              <input class="appointment__input" type="text" placeholder="First name">
              <input class="appointment__input" type="text" placeholder="Last name">
              <input class="appointment__input" type="email" placeholder="Email">
              <input class="appointment__input" type="text" placeholder="Mobile">
              <button class="appointment__btn">SEND</button>
            </form>
            <picture>
             <source srcset="images/appointment.avif" type="image/avif">
             <source srcset="images/appointment.webp" type="image/webp">
             <img class="appointment__box-img" src="images/appointment.jpg" alt="Alt text">
            </picture>
          </div>
        </div>
      </section>
    </main>
